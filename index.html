<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link external css file -->
    <link rel="stylesheet" href="styles/custom.css" />
    <!-- link to Fontawesome icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Expense Tracker App</title>
  </head>
  <body>
    <div class="container">
      <!-- main heading of the application -->
      <h1>Expense Tracker</h1>
      <!-- expense input Form section start -->
      <div class="section">
        <form id="expense-form">
          <!-- date input -->
          <div class="input-group">
            <label for="expense-date"> Date </label>
            <input type="date" id="expense-date" />
          </div>
          <!-- expense name input -->
          <div class="input-group">
            <label for="expense-name">Expense Name</label>
            <input
              type="text"
              id="expense-name"
              placeholder="e.g. rent"
              required
            />
          </div>
          <!-- expense amount input -->
          <div class="input-group">
            <label for="expense-amount">Expense Amount(£)</label>
            <input
              type="number"
              id="expense-amount"
              placeholder="e.g. 100"
              min="0"
              step="0.01"
              required
            />
          </div>
          <!-- category dropdown -->
          <div class="input-group">
            <label for="expense-category">Choose a Category</label>
            <select id="expense-category">
              <option value="">- - - Select a category - - -</option>
              <option value="housing">Housing</option>
              <option value="food">Food</option>
              <option value="transportation">Transportation</option>
              <option value="entertainment">Entertainment</option>
              <option value="others">Others</option>
            </select>
          </div>
          <!-- submit button -->
          <div class="button-group">
            <button type="submit">Add Expense</button>
          </div>
        </form>
      </div>

      <!-- transaction history section start -->
      <div class="section">
        <div class="table-container">
          <h2>Transaction History</h2>

          <!-- table for displayin all expenses -->
          <table>
            <thead>
              <tr>
                <th scope="col">Expense Name</th>
                <th scope="col">Category</th>
                <th scope="col">Amount(£)</th>
                <th scope="col">Date</th>
                <th scope="col">Action</th>
              </tr>
            </thead>

            <!-- dynamic rows will be inserted here via JavaScript -->
            <tbody id="transaction-history"></tbody>
          </table>
        </div>

        <!-- total expense summary -->
        <div class="summary">
          <p>Total Expenses: £<span id="total-amount">0</span></p>
        </div>
      </div>

      <!-- category filter section start -->
      <div class="section">
        <div class="filter-dropdown-container">
          <label for="filter-category">Filter by Category:</label>
          <select id="filter-category">
            <option value="All">All</option>
            <option value="Housing">Housing</option>
            <option value="Food">Food</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Transportation">Transportation</option>
            <option value="Others">Others</option>
          </select>
        </div>
      </div>
    </div>
    <!-- Linked to external javascript file -->
    <script src="javascript/script.js"></script>
  </body>
</html>
